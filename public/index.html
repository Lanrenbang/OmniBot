<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmniBot - WeChat Channel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }
    .card {
      background: rgba(255,255,255,0.95); border-radius: 16px;
      padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center; max-width: 420px; width: 90%;
    }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 24px; line-height: 1.6; }
    .status { font-size: 14px; color: #999; }
  </style>
</head>
<body>
  <div class="card">
    <h1>OmniBot</h1>
    <p>微信 Channel 骨架<br>扫码登录功能开发中</p>
    <div class="status">Channel Status: <strong>Active</strong></div>
  </div>
</body>
</html>
