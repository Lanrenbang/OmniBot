<!doctype html>
<html class="dark" lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>OmniBot | Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/qr-code-styling@1.9.2/lib/qr-code-styling.js"></script>
    <link href="../style.css" rel="stylesheet" />
    <script src="../script.js" defer></script>
  </head>
  <body
    class="min-h-screen flex flex-col items-center justify-between selection:bg-primary-container selection:text-on-primary-container"
  >
    <header class="w-full top-0 sticky flex justify-between items-center px-6 py-4 max-w-screen-xl mx-auto z-50">
      <div class="flex items-center gap-2">
        <span class="text-2xl font-bold tracking-tighter text-[#45e17c]">OmniBot</span>
        <div
          id="version-badge"
          class="px-2 py-0.5 rounded-full bg-surface-container-highest text-on-surface-variant text-[10px] font-medium tracking-wider"
        >
          iLink 版本：获取中...
        </div>
      </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center w-full px-4 py-8 relative">
      <div class="w-full max-w-md space-y-8 text-center z-10">
        <div class="space-y-3">
          <h1 class="text-4xl md:text-5xl font-bold tracking-tight text-on-surface">OmniBot</h1>
          <p class="text-on-surface-variant text-sm tracking-wide">基于微信 iLink 协议的轻量级机器人框架</p>
        </div>

        <div class="relative group" id="login-section">
          <!-- QR Code Box -->
          <div
            class="mx-auto w-[240px] h-[240px] md:w-[280px] md:h-[280px] glass-card rounded-3xl p-4 relative overflow-hidden transition-all duration-500 shadow-2xl ring-1 ring-white/10"
            id="qr-card"
          >
            <div class="scan-line" id="scan-line"></div>
            <div
              id="scaned-overlay"
              class="absolute inset-0 z-20 flex items-center justify-center bg-black/40 opacity-0 pointer-events-none transition-opacity duration-500 rounded-3xl"
            >
              <span class="text-white text-lg font-bold tracking-wide drop-shadow-lg">已扫码</span>
            </div>
            <div
              id="redirect-spinner"
              class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-black/60 opacity-0 pointer-events-none transition-opacity duration-500 rounded-3xl"
            >
              <div class="spinner mb-3"></div>
              <span class="text-white text-sm font-medium tracking-wide">正在切换服务器...</span>
            </div>
            <div class="w-full h-full flex items-center justify-center bg-white rounded-xl overflow-hidden" id="qrcode">
              <!-- QR Code will be rendered here -->
            </div>
          </div>

          <div class="mt-3 flex justify-center">
            <span
              id="status-badge"
              class="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-white/10 text-white/80 border border-white/10 transition-all duration-500"
            >
              等待扫码
            </span>
          </div>

          <!-- verify code input (hidden by default, shown on need_verifycode) -->
          <div id="verify-code-section" class="hidden mt-4 space-y-3">
            <input
              id="verify-code-input"
              type="text"
              pattern="[0-9]{8}"
              maxlength="8"
              placeholder="请输入手机上显示的 8 位配对码"
              class="w-full px-4 py-3 rounded-xl bg-[#2a2a2a] border border-white/10 text-white text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-[#45e17c]/50 focus:border-[#45e17c] transition-all"
            />
            <button
              id="verify-code-submit"
              class="w-full px-6 py-3 rounded-xl bg-[#45e17c] text-black font-bold hover:bg-[#3ccf6e] transition-all disabled:opacity-50"
            >
              提交配对码
            </button>
            <p class="text-xs text-on-surface-variant opacity-60">请在微信手机端查看配对码并输入上方</p>
          </div>

          <!-- Log container -->
          <div
            class="mt-6 bg-[#1a1a1a] rounded-xl border border-white/10 p-4 h-[140px] overflow-y-auto shadow-inner text-left font-mono text-[13px] relative flex flex-col gap-1.5 scroll-smooth"
            id="log-container"
          ></div>

          <!-- Refresh button (hidden by default, shown on expired/verify_code_blocked) -->
          <span id="expired-countdown" class="hidden countdown"></span>
          <button
            id="refresh-btn"
            class="hidden mt-4 px-6 py-3 rounded-xl bg-[#45e17c] text-black font-bold hover:bg-[#3ccf6e] transition-all"
          >
            刷新二维码
          </button>
        </div>

        <!-- Success message -->
        <div
          id="success-message"
          class="hidden mt-8 p-6 bg-primary-container/10 border border-primary/40 rounded-2xl backdrop-blur-md"
        >
          <div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-4">
            <span class="text-3xl">🎉</span>
          </div>
          <h3 id="success-title" class="text-xl font-bold text-primary mb-2">连接鉴权成功</h3>
          <p id="success-desc" class="text-sm text-on-surface-variant leading-relaxed">机器人实例已在云端边缘节点拉起并进入后台运行。</p>
          <div class="mt-5 pt-5 border-t border-white/10">
            <p class="text-sm font-bold text-white">您现在可以安全关闭此页面，返回微信开始交互。</p>
          </div>
        </div>
      </div>
    </main>

    <footer class="w-full py-6 mt-auto text-center">
      <p class="text-[0.75rem] text-on-surface-variant opacity-50">
        &copy; 2026 OmniBot Architecture. All rights reserved.
      </p>
    </footer>
  </body>
</html>
